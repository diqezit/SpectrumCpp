name: Build SpectrumCpp

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore CMake build cache
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.config }}
          key: ${{ runner.os }}-cmake-${{ matrix.config }}-${{ hashFiles('CMakeLists.txt', '**/*.cmake', '.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-cmake-${{ matrix.config }}-

      - name: Configure CMake
        run: >
          cmake -S . -B build/${{ matrix.config }}
          -A x64

      - name: Build
        run: >
          cmake --build build/${{ matrix.config }}
          --config ${{ matrix.config }}
          --parallel
